<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card | RHR Smart Way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; transition: 0.5s; }
        
        /* Core UI Classes based on your images */
        .glass-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Themes */
        .theme-classic { background: #ffffff; color: #1e293b; }
        .theme-modern { background: #f8fafc; border: 2px solid #e2e8f0; }
        .theme-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.4); }

        /* Dynamic UI Styles (UI-1 to UI-10) */
        .ui-1 #header-shape { clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%); height: 160px; }
        .ui-2 #header-shape { clip-path: ellipse(100% 100% at 50% 0%); height: 180px; }
        .ui-3 .profile-img-container { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); border-radius: 0; }
        .ui-4 .glass-card { border-left: 12px solid var(--header-color); border-radius: 8px !important; }
        .ui-5 { background: #111 !important; color: white !important; }
        .ui-6 #header-shape { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 45%); height: 190px; }
        .ui-7 #header-shape { border-radius: 0 0 80px 80px; }
        .ui-8 .social-btn { background: #1e293b; color: white; border-radius: 4px; }
        .ui-9 #header-shape { clip-path: polygon(0 0, 100% 0, 0 100%); height: 210px; }
        .ui-10 .glass-card { border: 3px solid #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.3); }

        .profile-img-container { width: 120px; height: 120px; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: -60px; z-index: 20; position: relative; }
        .btn-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body id="page-bg" class="min-h-screen flex items-center justify-center p-4 bg-blue-700">

    <div id="loader" class="text-white text-xl font-bold animate-pulse">Syncing with RHR Cloud...</div>

    <div id="card-wrap" class="max-w-sm w-full hidden">
        <div id="card-body" class="glass-card rounded-[2.5rem] shadow-2xl overflow-hidden bg-white text-center">
            <div id="header-shape" class="w-full bg-slate-800"></div>
            
            <div class="px-6 pb-10">
                <div class="flex justify-center mb-4">
                    <div class="profile-img-container rounded-full overflow-hidden bg-gray-200">
                        <img id="view-photo" src="" alt="Profile" class="w-full h-full object-cover">
                    </div>
                </div>

                <h1 id="view-name" class="text-2xl font-extrabold text-slate-800"></h1>
                <p id="view-title" class="text-xs font-bold uppercase tracking-widest mt-1 opacity-80"></p>
                <p id="view-company" class="text-[10px] font-semibold text-slate-400 mb-4"></p>
                
                <p id="view-bio" class="text-xs text-slate-500 italic mb-6 px-4 leading-relaxed"></p>

                <button id="main-btn" onclick="downloadVCF()" class="w-full py-4 rounded-2xl text-white font-bold text-sm shadow-lg btn-hover flex items-center justify-center gap-2 mb-6">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> SAVE CONTACT
                </button>

                <div class="flex justify-center gap-3 mb-4">
                    <a id="call-link" href="#" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 btn-hover text-slate-600"><i data-lucide="phone" class="w-5 h-5"></i></a>
                    <a id="mail-link" href="#" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 btn-hover text-slate-600"><i data-lucide="mail" class="w-5 h-5"></i></a>
                    <a id="web-link" href="#" target="_blank" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 btn-hover text-slate-600"><i data-lucide="globe" class="w-5 h-5"></i></a>
                </div>

                <div class="flex gap-2 mb-8">
                    <a id="fb-link" href="#" target="_blank" class="flex-1 py-3 bg-slate-50 rounded-xl font-bold text-[10px] uppercase border border-slate-100 social-btn btn-hover">Facebook</a>
                    <a id="li-link" href="#" target="_blank" class="flex-1 py-3 bg-slate-50 rounded-xl font-bold text-[10px] uppercase border border-slate-100 social-btn btn-hover">LinkedIn</a>
                </div>

                <div class="text-left space-y-3">
                    <div class="flex items-start gap-3 p-4 bg-slate-50/50 rounded-2xl">
                        <i data-lucide="map-pin" class="w-4 h-4 text-slate-400 mt-1"></i>
                        <div>
                            <span class="text-[9px] font-bold text-slate-400 uppercase">Address</span>
                            <p id="view-address" class="text-xs font-semibold text-slate-700"></p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3 p-4 bg-slate-50/50 rounded-2xl">
                        <i data-lucide="briefcase" class="w-4 h-4 text-slate-400 mt-1"></i>
                        <div>
                            <span class="text-[9px] font-bold text-slate-400 uppercase">Expertise</span>
                            <p id="view-services" class="text-xs font-semibold text-slate-700"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHsGGMXTX0rFGdCkr98f8aUNOs9NfWKP6PCdxLTQGh0KvO6oaPdn6q2AT7kswp7oC_/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const USER_ID = urlParams.get('id') || "RHR-BIZ-01";
        let user = {};

        async function loadCard() {
            try {
                const response = await fetch(`${SCRIPT_URL}?id=${USER_ID}`);
                const res = await response.json();
                if (res.success) {
                    user = res.data;
                    renderUI();
                } else {
                    document.getElementById('loader').innerText = "Card Not Found!";
                }
            } catch (err) {
                document.getElementById('loader').innerText = "Connection Failed!";
            }
        }

        function renderUI() {
            // Text Content
            document.getElementById('view-name').innerText = user.Name;
            document.getElementById('view-title').innerText = user.Title;
            document.getElementById('view-company').innerText = user.Company;
            document.getElementById('view-bio').innerText = user.Bio;
            document.getElementById('view-address').innerText = user.Address;
            document.getElementById('view-services').innerText = user.Services;
            document.getElementById('view-photo').src = user.Photo;

            // Links
            document.getElementById('call-link').href = `tel:${user.Mobile}`;
            document.getElementById('mail-link').href = `mailto:${user.Email}`;
            document.getElementById('web-link').href = user.Website;
            document.getElementById('fb-link').href = user.Facebook;
            document.getElementById('li-link').href = user.LinkedIn;

            // Styling & Themes
            const body = document.getElementById('page-bg');
            const card = document.getElementById('card-body');
            const header = document.getElementById('header-shape');
            const btn = document.getElementById('main-btn');

            body.style.backgroundColor = user.BG_Color;
            header.style.backgroundColor = user.Header_Color;
            btn.style.backgroundColor = user.Header_Color;
            document.documentElement.style.setProperty('--header-color', user.Header_Color);

            // Apply Interface & Theme Classes (e.g., ui-1 theme-glass)
            card.className = `glass-card rounded-[2.5rem] shadow-2xl overflow-hidden text-center ${user.Theme} ${user.User_Interface}`;

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('card-wrap').classList.remove('hidden');
            lucide.createIcons();
        }

        function downloadVCF() {
            const vcfData = `BEGIN:VCARD\nVERSION:3.0\nFN:${user.Name}\nORG:${user.Company}\nTITLE:${user.Title}\nTEL:${user.Mobile}\nEMAIL:${user.Email}\nURL:${user.Website}\nEND:VCARD`;
            const blob = new Blob([vcfData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${user.Name}.vcf`;
            a.click();
        }

        window.onload = loadCard;
    </script>
</body>
</html>
