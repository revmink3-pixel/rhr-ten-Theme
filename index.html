<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card | RHR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap');
        
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: all 0.4s ease; }
        
        /* Main Container Fix */
        #render-area { display: flex; justify-content: center; align-items: center; width: 100%; min-height: 100vh; padding: 20px; }

        /* UI-1: Premium Dark (Daniel Gallego Style) */
        .ui-1 { width: 100%; max-width: 400px; background: #000; border-radius: 40px; color: white; padding: 50px 25px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; overflow: hidden; border: 1px solid #222; }
        .ui-1 .profile-img { width: 160px; height: 160px; border-radius: 50%; border: 6px solid #f7a028; object-fit: cover; margin-bottom: 25px; }
        .ui-1 h1 { font-family: 'Montserrat', sans-serif; font-size: 28px; margin-bottom: 5px; }
        .ui-1 .title { color: #f7a028; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; font-size: 14px; margin-bottom: 30px; }
        .ui-1 .info-text { font-size: 15px; color: #ccc; margin-bottom: 8px; }
        .ui-1 .divider { width: 150px; height: 2px; background: #f7a028; margin: 25px 0; }
        
        /* UI-0: Modern Glass (Rakib Style) */
        .ui-0 { width: 100%; max-width: 400px; background: #f3f4f6; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .ui-0 .header-bg { height: 140px; width: 100%; }
        .ui-0 .content { padding: 0 25px 40px; margin-top: -70px; text-align: center; }
        .ui-0 .profile-img { width: 140px; height: 140px; border-radius: 50%; border: 5px solid white; margin: 0 auto 20px; object-fit: cover; background: #eee; }
        .ui-0 h1 { font-size: 24px; font-weight: 800; color: #1e293b; }
        .ui-0 .title { color: #2563eb; font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; margin-top: 4px; }
        .ui-0 .save-btn { width: 100%; padding: 16px; border-radius: 20px; color: white; font-weight: 700; margin-top: 25px; transition: transform 0.2s; }
        
        .hidden { display: none !important; }
        #main-loader { color: white; font-weight: 600; text-align: center; width: 100%; margin-top: 50px; }
    </style>
</head>
<body id="body-bg" class="bg-slate-900">

    <button onclick="openModal('pin-modal')" class="fixed top-5 right-5 p-3 bg-white/10 backdrop-blur-lg rounded-full z-50 text-white border border-white/20">
        <i data-lucide="settings-2" class="w-6 h-6"></i>
    </button>

    <div id="main-loader" class="animate-pulse">Connecting to RHR Cloud...</div>
    
    <div id="render-area" class="hidden"></div>

    <div id="pin-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[100] p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-xs text-center">
            <h3 class="font-bold text-lg mb-4 text-slate-800">Admin Login</h3>
            <input type="password" id="pin-input" class="w-full text-center text-2xl font-bold border-b-2 outline-none mb-6 p-2" placeholder="••••">
            <button onclick="checkPin()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Verify</button>
            <button onclick="closeModal('pin-modal')" class="mt-2 text-slate-400 text-sm">Cancel</button>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-white hidden overflow-y-auto p-6 z-[200]">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Card Customization</h2>
                <button onclick="closeModal('edit-modal')" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            
            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Interface Design</label>
            <select id="inp-ui" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 outline-none border-2 border-slate-100">
                <option value="ui-0">UI-0: Modern Light (Rakib Style)</option>
                <option value="ui-1">UI-1: Premium Dark (Daniel Style)</option>
            </select>

            <div id="form-fields" class="space-y-4"></div>

            <div class="grid grid-cols-2 gap-4 mt-6 p-4 bg-slate-50 rounded-2xl">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">ACCENT COLOR</label>
                    <input type="color" id="inp-headercolor" class="w-full h-10 rounded-lg">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">PAGE BG COLOR</label>
                    <input type="color" id="inp-bgcolor" class="w-full h-10 rounded-lg">
                </div>
            </div>

            <button onclick="saveData()" id="save-btn" class="w-full py-5 bg-black text-white rounded-2xl font-bold mt-8 shadow-lg uppercase tracking-widest">Update Cloud</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybQJ34uTIoKI44vpV7jAEnUMEkDrjQneIQ-cqHMIoPa5ZmjykLvRWD0hmhMt_lKCZ_/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const PROFILE_ID = urlParams.get('id') || "RHR-BIZ-01";
        let userData = {};

        async function init() {
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) {
                    userData = result.data;
                    renderView();
                } else { document.getElementById('main-loader').innerText = "Profile Not Found!"; }
            } catch (e) { document.getElementById('main-loader').innerText = "Network Error!"; }
        }

        function renderView() {
            const area = document.getElementById('render-area');
            const ui = userData.User_Interface || "ui-0";
            document.body.style.backgroundColor = userData.BG_Color || "#0f172a";
            area.innerHTML = "";

            if (ui === "ui-1") {
                area.innerHTML = `
                <div class="ui-1" style="background: ${userData.BG_Color}">
                    <img src="${userData.Photo}" class="profile-img" style="border-color: ${userData.Header_Color}">
                    <h1>${userData.Name}</h1>
                    <p class="title" style="color: ${userData.Header_Color}">${userData.Title}</p>
                    <div class="space-y-2 text-gray-300">
                        <p class="info-text">${userData.Mobile}</p>
                        <p class="info-text">${userData.Email}</p>
                        <p class="info-text">ID-${PROFILE_ID}</p>
                    </div>
                    <div class="divider" style="background: ${userData.Header_Color}"></div>
                    <p class="text-sm font-medium tracking-widest text-gray-400">${userData.Website.replace('https://','')}</p>
                </div>`;
            } else {
                area.innerHTML = `
                <div class="ui-0">
                    <div class="header-bg" style="background: ${userData.Header_Color}"></div>
                    <div class="content">
                        <img src="${userData.Photo}" class="profile-img">
                        <h1>${userData.Name}</h1>
                        <p class="title">${userData.Title}</p>
                        <p class="text-slate-500 text-sm mt-3 px-4">${userData.Bio || ''}</p>
                        <button onclick="saveVCF()" class="save-btn shadow-xl" style="background: ${userData.Header_Color}">Save Contact</button>
                        <div class="flex justify-center gap-4 mt-8">
                            <a href="tel:${userData.Mobile}" class="p-4 bg-white rounded-2xl shadow-sm text-slate-600"><i data-lucide="phone"></i></a>
                            <a href="mailto:${userData.Email}" class="p-4 bg-white rounded-2xl shadow-sm text-slate-600"><i data-lucide="mail"></i></a>
                            <a href="${userData.Website}" target="_blank" class="p-4 bg-white rounded-2xl shadow-sm text-slate-600"><i data-lucide="globe"></i></a>
                        </div>
                    </div>
                </div>`;
            }

            document.getElementById('main-loader').classList.add('hidden');
            area.classList.remove('hidden');
            lucide.createIcons();
        }

        function checkPin() {
            if(document.getElementById('pin-input').value === (userData.Admin_PIN || "1234")) {
                setupForm(); closeModal('pin-modal'); openModal('edit-modal');
            } else { alert("Access Denied!"); }
        }

        function setupForm() {
            const fields = [
                {id: 'name', label: 'Full Name', val: userData.Name},
                {id: 'title', label: 'Job Title', val: userData.Title},
                {id: 'mobile', label: 'Mobile', val: userData.Mobile},
                {id: 'email', label: 'Email', val: userData.Email},
                {id: 'website', label: 'Website URL', val: userData.Website},
                {id: 'photo', label: 'Photo URL', val: userData.Photo},
                {id: 'pin', label: 'Admin PIN', val: userData.Admin_PIN}
            ];
            document.getElementById('inp-ui').value = userData.User_Interface || "ui-0";
            document.getElementById('inp-headercolor').value = userData.Header_Color || "#2563eb";
            document.getElementById('inp-bgcolor').value = userData.BG_Color || "#0f172a";
            document.getElementById('form-fields').innerHTML = fields.map(f => `
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">${f.label}</label>
                    <input id="inp-${f.id}" value="${f.val || ''}" class="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm border border-transparent focus:border-blue-200">
                </div>`).join('');
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Syncing..."; btn.disabled = true;
            const payload = {
                id: PROFILE_ID,
                userInterface: document.getElementById('inp-ui').value,
                name: document.getElementById('inp-name').value,
                title: document.getElementById('inp-title').value,
                mobile: document.getElementById('inp-mobile').value,
                email: document.getElementById('inp-email').value,
                website: document.getElementById('inp-website').value,
                photo: document.getElementById('inp-photo').value,
                pin: document.getElementById('inp-pin').value,
                headerColor: document.getElementById('inp-headercolor').value,
                bgColor: document.getElementById('inp-bgcolor').value
            };
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                if(await res.text() === "Success") { alert("Updated!"); location.reload(); }
            } catch (e) { alert("Failed!"); btn.disabled = false; btn.innerText = "Update Cloud"; }
        }

        function openModal(id) { document.getElementById(id).style.display = (id==='pin-modal'?'flex':'block'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
