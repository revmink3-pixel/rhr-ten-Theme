<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card | RHR Smart Way</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; }
        
        .glass-card { transition: all 0.4s ease; border-radius: 2.5rem; background: white; min-height: 650px; position: relative; overflow: hidden; }
        .profile-img { object-fit: cover; z-index: 10; position: relative; }
        .hidden { display: none; }

        /* --- UI Designs --- */
        /* UI-1: Classic */
        .ui-1 #header-bg { background: #1e293b; height: 140px; clip-path: polygon(0 0, 100% 0, 100% 70%, 0% 100%); }
        .ui-1 #view-photo { width: 120px; height: 120px; margin-top: -60px; border: 5px solid white; border-radius: 50%; }

        /* UI-2: Modern (As per your screenshot) */
        .ui-2 #header-bg { background: #ff0000; height: 180px; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%); }
        .ui-2 #view-photo { width: 130px; height: 130px; border-radius: 50%; margin-top: -90px; border: 5px solid white; }

        /* UI-10: Dark Luxury */
        .ui-10 { background: #000; color: #fbbf24; }
        .ui-10 .icon-box { background: #111; color: #fbbf24; }

        /* General Helper */
        .icon-box { min-width: 48px; min-height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 1rem; background: #f1f5f9; color: #475569; }
        .social-link { flex: 1; padding: 12px; text-align: center; border-radius: 12px; background: #f1f5f9; font-weight: 700; font-size: 13px; color: #1e293b; }
    </style>
</head>
<body id="body-bg" class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <button onclick="toggleModal()" class="fixed top-6 right-6 z-50 bg-white/20 hover:bg-white/40 p-3 rounded-full backdrop-blur-md border border-white/30 shadow-xl transition-all active:scale-90">
        <i data-lucide="settings" class="w-6 h-6 text-white"></i>
    </button>

    <div id="main-loader" class="text-white text-center">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-white mx-auto mb-4"></div>
        <p class="font-bold italic">RHR Cloud Syncing...</p>
    </div>

    <div id="card-container" class="max-w-sm w-full glass-card shadow-2xl hidden">
        <div id="header-bg"></div>
        <div class="px-6 pb-8 text-center">
            <img id="view-photo" src="" alt="Profile" class="profile-img mx-auto mb-4 shadow-lg">
            <h1 id="view-name" class="text-2xl font-extrabold tracking-tight text-slate-800"></h1>
            <p id="view-title" class="text-xs font-bold uppercase tracking-widest text-blue-600 mb-1"></p>
            <p id="view-company" class="text-[10px] opacity-60 mb-4 font-bold uppercase"></p>
            <div class="mb-6 px-2"><p id="view-bio" class="text-xs italic leading-relaxed text-slate-500"></p></div>

            <button onclick="saveVCF()" id="cta-btn" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold text-sm mb-6 flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
                <i data-lucide="user-plus" class="w-4 h-4"></i> SAVE CONTACT
            </button>

            <div class="flex justify-center gap-3 mb-4">
                <a id="link-mobile" href="#" class="icon-box"><i data-lucide="phone" class="w-5 h-5"></i></a>
                <a id="link-email" href="#" class="icon-box"><i data-lucide="mail" class="w-5 h-5"></i></a>
                <a id="link-website" href="#" target="_blank" class="icon-box"><i data-lucide="globe" class="w-5 h-5"></i></a>
            </div>

            <div class="flex gap-2 mb-6">
                <a id="link-facebook" href="#" target="_blank" class="social-link">FACEBOOK</a>
                <a id="link-linkedin" href="#" target="_blank" class="social-link">LINKEDIN</a>
            </div>

            <div class="space-y-3 text-left">
                <div class="flex gap-4 items-start p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <i data-lucide="map-pin" class="w-5 h-5 text-slate-400 mt-1"></i>
                    <div><p class="text-[9px] font-bold text-slate-400 uppercase">Address</p><p id="view-address" class="text-xs font-semibold text-slate-700"></p></div>
                </div>
                <div class="flex gap-4 items-start p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <i data-lucide="briefcase" class="w-5 h-5 text-slate-400 mt-1"></i>
                    <div><p class="text-[9px] font-bold text-slate-400 uppercase">Services</p><p id="view-services" class="text-xs font-semibold text-slate-700"></p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[60] bg-black/70 backdrop-blur-sm flex items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-slate-800">Card Settings</h2>
                <button onclick="toggleModal()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Full Name</label><input id="edit-name" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-blue-500 transition-all"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Design ID (1-10)</label><input id="edit-ui" type="number" class="w-full p-4 bg-slate-100 rounded-2xl outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Photo URL</label><input id="edit-photo" class="w-full p-4 bg-slate-100 rounded-2xl outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Admin PIN</label><input id="edit-pin" type="password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none border-2 border-red-100" placeholder="Required to Save"></div>
            </div>

            <button onclick="updateProfile()" id="update-btn" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold mt-8 shadow-xl active:scale-95 transition-all">
                UPDATE PROFILE
            </button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-1vcPqCVDFuRa46_zThEtAGbB8pA_Loucr3DZE3jICmX4S5pmQCmttyCY4iF701R-/exec";
        const params = new URLSearchParams(window.location.search);
        const PROFILE_ID = params.get('id') || "RHR-BIZ-01";
        let userData = {};

        async function init() {
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) {
                    userData = result.data;
                    renderCard();
                } else {
                    document.getElementById('main-loader').innerHTML = "<p class='text-red-400'>Data Not Found!</p>";
                }
            } catch (e) {
                document.getElementById('main-loader').innerText = "Sync Failed!";
            }
        }

        function renderCard() {
            document.getElementById('view-photo').src = userData.Photo || 'https://via.placeholder.com/150';
            document.getElementById('view-name').innerText = userData.Name;
            document.getElementById('view-title').innerText = userData.Title;
            document.getElementById('view-company').innerText = userData.Company;
            document.getElementById('view-bio').innerText = userData.Bio;
            document.getElementById('view-address').innerText = userData.Address;
            document.getElementById('view-services').innerText = userData.Services;

            // Links
            document.getElementById('link-mobile').href = `tel:${userData.Mobile}`;
            document.getElementById('link-email').href = `mailto:${userData.Email}`;
            document.getElementById('link-website').href = userData.Website;
            document.getElementById('link-facebook').href = userData.Facebook;
            document.getElementById('link-linkedin').href = userData.LinkedIn;

            // UI & Theme
            document.body.style.backgroundColor = userData.BG_Color || "#0f172a";
            const card = document.getElementById('card-container');
            card.className = `max-w-sm w-full glass-card shadow-2xl ui-${userData.User_Interface || '1'}`;
            
            if(userData.Header_Color) {
                document.getElementById('header-bg').style.backgroundColor = userData.Header_Color;
                document.getElementById('cta-btn').style.backgroundColor = userData.Header_Color;
            }

            document.getElementById('main-loader').classList.add('hidden');
            card.classList.remove('hidden');
            lucide.createIcons();
        }

        function toggleModal() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                document.getElementById('edit-name').value = userData.Name;
                document.getElementById('edit-ui').value = userData.User_Interface;
                document.getElementById('edit-photo').value = userData.Photo;
            }
        }

        async function updateProfile() {
            const pin = document.getElementById('edit-pin').value;
            if(pin !== String(userData.Admin_PIN)) return alert("Incorrect Admin PIN!");

            const btn = document.getElementById('update-btn');
            btn.innerText = "Saving to Cloud...";
            btn.disabled = true;

            const payload = {
                id: PROFILE_ID,
                pin: pin,
                name: document.getElementById('edit-name').value,
                userInterface: document.getElementById('edit-ui').value,
                photo: document.getElementById('edit-photo').value,
                // Add other fields as needed
                title: userData.Title, company: userData.Company, bio: userData.Bio,
                mobile: userData.Mobile, email: userData.Email, website: userData.Website,
                facebook: userData.Facebook, linkedin: userData.LinkedIn,
                address: userData.Address, services: userData.Services,
                bgColor: userData.BG_Color, headerColor: userData.Header_Color, theme: userData.Theme
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("Success! Reloading...");
                location.reload();
            } catch (e) {
                alert("Update Error!");
            } finally {
                btn.innerText = "UPDATE PROFILE";
                btn.disabled = false;
            }
        }

        function saveVCF() {
            const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${userData.Name}\nORG:${userData.Company}\nTITLE:${userData.Title}\nTEL:${userData.Mobile}\nEMAIL:${userData.Email}\nEND:VCARD`;
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${userData.Name}.vcf`; a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
