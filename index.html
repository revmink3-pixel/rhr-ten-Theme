<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Digital Business Card | RHR Smart Way</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; overflow-x: hidden; }
        
        .glass-card { transition: all 0.4s ease; border-radius: 2.5rem; background: white; min-height: 600px; position: relative; overflow: hidden; }
        .profile-img { object-fit: cover; transition: all 0.3s; z-index: 10; position: relative; }
        .hidden { display: none; }

        /* --- 10 Unique UI Designs based on your images --- */

        /* UI-1: Classic Professional (Francisco) */
        .ui-1 #header-bg { background: #1e293b; height: 140px; clip-path: polygon(0 0, 100% 0, 100% 70%, 0% 100%); }
        .ui-1 #view-photo { width: 120px; height: 120px; margin-top: -60px; border: 5px solid white; border-radius: 50%; }

        /* UI-2: Modern Corporate (Donna) */
        .ui-2 { text-align: left !important; }
        .ui-2 #header-bg { background: linear-gradient(135deg, #1e3a8a 0%, #0ea5e9 100%); height: 160px; }
        .ui-2 #view-photo { width: 130px; height: 130px; border-radius: 1rem; margin: -80px 0 20px 20px; border: 5px solid white; }
        .ui-2 #view-name, .ui-2 #view-title, .ui-2 #view-bio { text-align: left; padding-left: 20px; }

        /* UI-3: Dark Elegant (Juliana) */
        .ui-3 { background: #0f172a; color: white; }
        .ui-3 #header-bg { background: #083344; height: 100px; border-radius: 0 0 50% 50%; }
        .ui-3 #view-photo { border: 4px solid #22d3ee; width: 130px; height: 130px; border-radius: 50%; }
        .ui-3 #view-name { color: #22d3ee; }
        .ui-3 .icon-box { background: #1e293b; color: #22d3ee; border: none; }

        /* UI-4: Vibrant Gradient (Olivia) */
        .ui-4 { background: linear-gradient(to bottom, #d946ef, #fb923c); color: white; }
        .ui-4 #view-photo { border: 8px solid rgba(255,255,255,0.3); width: 150px; height: 150px; }

        /* UI-5: Minimalist Box (Olivia Manager) */
        .ui-5 { border-top: 15px solid #334155; border-radius: 0; }
        .ui-5 #view-photo { border-radius: 0; width: 120px; height: 120px; border: 3px solid #334155; }

        /* UI-6: Sleek Diagonal (Mariana) */
        .ui-6 #header-bg { background: #111827; height: 220px; clip-path: ellipse(100% 80% at 50% 0%); }
        .ui-6 #view-photo { border: 5px solid #ef4444; margin-top: -110px; }
        .ui-6 #save-btn-view { background: #ef4444; }

        /* UI-7: Orange Clean (Olivia Marketing) */
        .ui-7 #header-bg { background: #f97316; height: 140px; border-radius: 0 0 100px 0; }
        .ui-7 #view-photo { border-radius: 50%; border: 5px solid white; margin-top: -70px; }
        .ui-7 #view-title { color: #f97316; }

        /* UI-8: Blue Dynamic (Olivia Manager) */
        .ui-8 { background: #eff6ff; }
        .ui-8 #header-bg { background: #2563eb; height: 120px; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 60%); }
        .ui-8 #view-photo { border: 4px solid #2563eb; }

        /* UI-9: Real Estate Style (Olivia) */
        .ui-9 #header-bg { background: #f43f5e; height: 150px; clip-path: circle(70% at 50% 0%); }
        .ui-9 #view-photo { border-radius: 0.75rem; margin-top: -75px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        /* UI-10: Luxury Black (Daniel) */
        .ui-10 { background: #000; color: #fbbf24; border: 1px solid #fbbf24; }
        .ui-10 #header-bg { background: #fbbf24; height: 10px; }
        .ui-10 #view-photo { border: 2px solid #fbbf24; padding: 4px; }
        .ui-10 .icon-box { background: #111; color: #fbbf24; }

        /* General Elements */
        .icon-box { min-width: 48px; min-height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 1rem; background: #f1f5f9; color: #475569; }
        .social-text-link { flex: 1; padding: 12px; text-align: center; border-radius: 12px; background: #f1f5f9; font-weight: 700; font-size: 13px; color: #1e293b; }
    </style>
</head>
<body id="body-bg" class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div id="main-loader" class="text-white text-center">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-white mx-auto mb-4"></div>
        <p class="font-bold italic">RHR Cloud Syncing...</p>
    </div>

    <div id="card-container" class="max-w-sm w-full glass-card shadow-2xl hidden">
        <div id="header-bg"></div>
        
        <div class="px-6 pb-8 text-center">
            <img id="view-photo" src="" alt="Profile" class="profile-img mx-auto mb-4">
            
            <h1 id="view-name" class="text-2xl font-extrabold tracking-tight"></h1>
            <p id="view-title" class="text-sm font-bold uppercase tracking-widest mb-1 opacity-80"></p>
            <p id="view-company" class="text-xs opacity-60 mb-4 font-semibold"></p>
            
            <div class="mb-6 px-2"><p id="view-bio" class="text-xs italic leading-relaxed opacity-75"></p></div>

            <button id="save-btn-view" onclick="saveVCF()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm mb-6 flex items-center justify-center gap-2 shadow-lg">
                <i data-lucide="user-plus" class="w-4 h-4"></i> SAVE CONTACT
            </button>

            <div class="flex justify-center gap-3 mb-4">
                <a id="link-mobile" href="#" class="icon-box"><i data-lucide="phone" class="w-5 h-5"></i></a>
                <a id="link-email" href="#" class="icon-box"><i data-lucide="mail" class="w-5 h-5"></i></a>
                <a id="link-website" href="#" target="_blank" class="icon-box"><i data-lucide="globe" class="w-5 h-5"></i></a>
            </div>

            <div class="flex gap-2 mb-8">
                <a id="link-facebook" href="#" target="_blank" class="social-text-link">FACEBOOK</a>
                <a id="link-linkedin" href="#" target="_blank" class="social-text-link">LINKEDIN</a>
            </div>

            <div class="space-y-3 text-left">
                <div class="flex gap-4 items-start p-4 bg-black/5 rounded-2xl">
                    <i data-lucide="map-pin" class="w-5 h-5 opacity-40 mt-1"></i>
                    <div><p class="text-[9px] font-bold opacity-40 uppercase">Address</p><p id="view-address" class="text-sm font-semibold"></p></div>
                </div>
                <div class="flex gap-4 items-start p-4 bg-black/5 rounded-2xl">
                    <i data-lucide="briefcase" class="w-5 h-5 opacity-40 mt-1"></i>
                    <div><p class="text-[9px] font-bold opacity-40 uppercase">Services</p><p id="view-services" class="text-sm font-semibold"></p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-1vcPqCVDFuRa46_zThEtAGbB8pA_Loucr3DZE3jICmX4S5pmQCmttyCY4iF701R-/exec";
        const params = new URLSearchParams(window.location.search);
        const PROFILE_ID = params.get('id') || "RHR-BIZ-01";
        let userData = {};

        async function init() {
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) {
                    userData = result.data;
                    renderView();
                } else {
                    document.getElementById('main-loader').innerHTML = "<p class='text-red-400'>Card Not Found!</p>";
                }
            } catch (e) {
                document.getElementById('main-loader').innerText = "Network Error!";
            }
        }

        function renderView() {
            // Mapping Data
            document.getElementById('view-photo').src = userData.Photo || 'https://via.placeholder.com/150';
            document.getElementById('view-name').innerText = userData.Name;
            document.getElementById('view-title').innerText = userData.Title;
            document.getElementById('view-company').innerText = userData.Company;
            document.getElementById('view-bio').innerText = userData.Bio;
            document.getElementById('view-address').innerText = userData.Address;
            document.getElementById('view-services').innerText = userData.Services;

            // Links
            document.getElementById('link-mobile').href = `tel:${userData.Mobile}`;
            document.getElementById('link-email').href = `mailto:${userData.Email}`;
            document.getElementById('link-website').href = userData.Website;
            document.getElementById('link-facebook').href = userData.Facebook;
            document.getElementById('link-linkedin').href = userData.LinkedIn;

            // Background & UI Logic
            document.body.style.backgroundColor = userData.BG_Color || "#0f172a";
            const uiNum = userData.User_Interface || "1";
            const card = document.getElementById('card-container');
            
            // Apply UI Class
            card.classList.add(`ui-${uiNum}`);
            
            // Custom Colors for certain elements
            if(userData.Header_Color) {
                const header = document.getElementById('header-bg');
                if(!card.classList.contains('ui-2') && !card.classList.contains('ui-4')) {
                    header.style.backgroundColor = userData.Header_Color;
                }
                document.getElementById('save-btn-view').style.backgroundColor = userData.Header_Color;
            }

            document.getElementById('main-loader').classList.add('hidden');
            card.classList.remove('hidden');
            lucide.createIcons();
        }

        function saveVCF() {
            const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${userData.Name}\nORG:${userData.Company}\nTITLE:${userData.Title}\nTEL:${userData.Mobile}\nEMAIL:${userData.Email}\nURL:${userData.Website}\nEND:VCARD`;
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${userData.Name}.vcf`; a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
